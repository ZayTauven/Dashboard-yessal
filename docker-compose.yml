version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yessal-front-web
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev --turbopack
    restart: unless-stopped
